name: bababam_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_storage: ^13.3.0
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  glass_kit: ^4.0.2
  camera: ^0.12.0+1
  cached_video_player_plus: ^3.0.1
  flutter_cache_manager: ^3.4.1
  preload_page_view: ^0.2.0
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/emoji/group1.png
    - assets/emoji/emoji1.png
    - assets/emoji/emoji2.png
    - assets/emoji/emoji3.png
    - assets/emoji/emoji4.png
    - assets/logo/logo.jpeg
    - assets/logo/title_logo.png
    - functions/assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.jpeg"
  remove_alpha_ios: true
